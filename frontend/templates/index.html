<!DOCTYPE html>
<html>
<head>
    <title>India Route Planner Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}?v=2">
</head>
<body>
    <div class="sidebar">
        <h1 class="logo">Route<span>Pro</span></h1>
        
        <div class="input-group">
            <label>Start City</label>
            <input list="city-data" id="startCity" placeholder="Search...">
        </div>
        <div class="input-group">
            <label>End City</label>
            <input list="city-data" id="endCity" placeholder="Search...">
        </div>
        <datalist id="city-data">
            {% for c in cities %}<option value="{{c}}">{% endfor %}
        </datalist>

        <div class="algo-selection">
            <p>Select Algorithms</p>
            <div class="grid">
                <label><input type="checkbox" class="algo" value="A*" checked> A*</label>
                <label><input type="checkbox" class="algo" value="Dijkstra"> Dijkstra</label>
                <label><input type="checkbox" class="algo" value="BFS"> BFS</label>
                <label><input type="checkbox" class="algo" value="DFS"> DFS</label>
            </div>
        </div>

        <button id="mainBtn">START ANALYSIS</button>

        <div id="results-container" class="hidden">
            <table>
                <thead>
                    <tr><th>Algo</th><th>KM</th><th>Nodes</th><th>Big O</th></tr>
                </thead>
                <tbody id="res-table-body"></tbody>
            </table>
        </div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}?v=2"></script>
</body>
</html>
